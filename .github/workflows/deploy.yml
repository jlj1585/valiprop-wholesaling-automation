name: Deploy ValipropWholesaling to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (prod)"
        required: true
        default: "prod"
        type: choice
        options:
          - prod

concurrency:
  group: deploy-valiprop-prod
  cancel-in-progress: false  # Never cancel an in-flight deployment

env:
  SOLUTION_NAME: ValipropWholesaling
  SOLUTION_FOLDER: ./src/ValipropWholesaling
  MANAGED_ZIP: ./solutions/ValipropWholesaling_managed.zip

jobs:
  # ───────────────────────────────────────────────────────────────────
  # JOB 1: Validate the solution before packing
  # ───────────────────────────────────────────────────────────────────
  validate:
    name: Validate Solution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Add PAC CLI to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Authenticate to Power Platform
        run: |
          pac auth create \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --clientSecret "${{ secrets.PP_CLIENT_SECRET }}" \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --environment "${{ secrets.PP_ENVIRONMENT_URL }}"

      - name: Pack solution (managed) for validation
        run: |
          mkdir -p ./solutions
          pac solution pack \
            --zipfile "${{ env.MANAGED_ZIP }}" \
            --folder "${{ env.SOLUTION_FOLDER }}" \
            --managed true \
            --processCanvasApps true

      - name: Run solution checker
        run: |
          pac solution check \
            --path "${{ env.MANAGED_ZIP }}" \
            --outputDirectory ./checker-results \
            --geo UnitedStates
        continue-on-error: true   # Log issues but don't block deploy on warnings

      - name: Upload checker results
        uses: actions/upload-artifact@v4
        with:
          name: solution-checker-results
          path: ./checker-results/
          retention-days: 30

      - name: Upload managed zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: managed-solution-zip
          path: ${{ env.MANAGED_ZIP }}
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Production
  # ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Valiprop-Prod
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: ${{ secrets.PP_ENVIRONMENT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download managed solution zip
        uses: actions/download-artifact@v4
        with:
          name: managed-solution-zip
          path: ./solutions/

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Add PAC CLI to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Authenticate to Power Platform
        run: |
          pac auth create \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --clientSecret "${{ secrets.PP_CLIENT_SECRET }}" \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --environment "${{ secrets.PP_ENVIRONMENT_URL }}"

      - name: Import managed solution to production
        run: |
          pac solution import \
            --path "${{ env.MANAGED_ZIP }}" \
            --activate-plugins true \
            --force-overwrite true \
            --publish-changes true

      - name: Verify solution import
        run: |
          pac solution list | grep "${{ env.SOLUTION_NAME }}"

  # ───────────────────────────────────────────────────────────────────
  # JOB 3: Post-deploy verification
  # ───────────────────────────────────────────────────────────────────
  post-deploy:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Add PAC CLI to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Authenticate to Power Platform
        run: |
          pac auth create \
            --applicationId "${{ secrets.PP_CLIENT_ID }}" \
            --clientSecret "${{ secrets.PP_CLIENT_SECRET }}" \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --environment "${{ secrets.PP_ENVIRONMENT_URL }}"

      - name: Confirm solution is present in environment
        run: pac solution list

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  ValipropWholesaling deployed to production"
          echo "  🕐  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  🔗  ${{ secrets.PP_ENVIRONMENT_URL }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "⚠️  MANUAL POST-DEPLOY CHECKLIST:"
          echo "   1. Verify all 16 flows are turned ON in Power Automate"
          echo "   2. Re-register Twilio inbound SMS webhook URL (Flow 8)"
          echo "   3. Re-register Play.ai callback webhook URL (Flow 6)"
          echo "   4. Re-register DocuSign Connect webhook URL (Flow 12)"
          echo "   5. Confirm Environment Variables are set in Valiprop-Prod"
          echo "   6. Send a test lead through the bulk import flow"

  # ───────────────────────────────────────────────────────────────────
  # JOB 4: Notify on failure
  # ───────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, deploy, post-deploy]
    if: failure()

    steps:
      - name: Log failure details
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ❌  Deployment FAILED"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Actor:   ${{ github.actor }}"
          echo "  Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
