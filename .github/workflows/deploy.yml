name: Deploy Power Platform Solution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-solution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Power Platform CLI
        run: npm install -g pac

      - name: Authenticate to Power Platform
        run: pac auth create --url https://valiprop.crm.dynamics.com

      - name: Pack solution
        run: |
          pac solution pack \
            --folder src \
            --zipfile valiprop-wholesaling-automation.zip

      - name: Import solution
        run: |
          pac solution import \
            --path valiprop-wholesaling-automation.zip \
            --force
